          description: >-
            Display name of the request owner.
        source:
          type: string
          description: >-
            Source of the action.
        note:
          type: string
          description: >-
            Additional note to add with the responder.
    Responder:
      type: object
      required:
        - type
      properties:
        id:
          type: string
          description: >-
            ID of the responder.
        name:
          type: string
          description: >-
            Name of the responder (for teams and schedules).
        username:
          type: string
          description: >-
            Username of the responder (for users).
        type:
          type: string
          enum:
            - team
            - user
            - escalation
            - schedule
          description: >-
            Type of the responder entity.
    Alert:
      type: object
      properties:
        id:
          type: string
          description: >-
            Unique identifier of the alert.
        tinyId:
          type: string
          description: >-
            Short, human-readable identifier of the alert.
        alias:
          type: string
          description: >-
            Client-defined identifier used for deduplication.
        message:
          type: string
          description: >-
            The message of the alert.
        status:
          type: string
          enum:
            - open
            - closed
          description: >-
            Current status of the alert.
        acknowledged:
          type: boolean
          description: >-
            Whether the alert has been acknowledged.
        isSeen:
          type: boolean
          description: >-
            Whether the alert has been seen.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags attached to the alert.
        snoozed:
          type: boolean
          description: >-
            Whether the alert is currently snoozed.
        snoozedUntil:
          type: string
          format: date-time
          description: >-
            The date and time when the snooze will end.
        lastOccurredAt:
          type: string
          format: date-time
          description: >-
            The last time the alert occurred.
        createdAt:
          type: string
          format: date-time
          description: >-
            The date and time when the alert was created.
        updatedAt:
          type: string
          format: date-time
          description: >-
            The date and time when the alert was last updated.
        count:
          type: integer
          description: >-
            The number of times the alert has occurred.
        source:
          type: string
          description: >-
            Source of the alert.
        owner:
          type: string
          description: >-
            The owner (assigned user) of the alert.
        priority:
          type: string
          enum:
            - P1
            - P2
            - P3
            - P4
            - P5
          description: >-
            Priority level of the alert.
        responders:
          type: array
          items:
            $ref: '#/components/schemas/Responder'
          description: >-
            Responders of the alert.
        integration:
          type: object
          properties:
            id:
              type: string
              description: >-
                Integration ID.
            name:
              type: string
              description: >-
                Integration name.
            type:
              type: string
              description: >-
                Integration type.
          description: >-
            Integration that created the alert.
        report:
          type: object
          properties:
            ackTime:
              type: integer
              description: >-
                Time in milliseconds to acknowledge the alert.
            closeTime:
              type: integer
              description: >-
                Time in milliseconds to close the alert.
            acknowledgedBy:
              type: string
              description: >-
                User who acknowledged the alert.
            closedBy:
              type: string
              description: >-
                User who closed the alert.
          description: >-
            Report with timing and actor information.
        actions:
          type: array
          items:
            type: string
          description: >-
            Custom actions available for the alert.
        entity:
          type: string
          description: >-
            Entity field of the alert.
        description:
          type: string
          description: >-
            Detailed description of the alert.
        details:
          type: object
          additionalProperties:
            type: string
          description: >-
            Custom key-value pairs attached to the alert.
