            type: string
        user:
          type: string
          description: >-
            Display name of the request owner.
        source:
          type: string
          description: >-
            Source of the action.
        note:
          type: string
          description: >-
            Additional note to add with the details.
    AddResponderRequest:
      type: object
      required:
