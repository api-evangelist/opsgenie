aid: opsgenie
url: https://raw.githubusercontent.com/api-evangelist/opsgenie/refs/heads/main/apis.yml
apis:
  - aid: opsgenie:alert-api
    name: OpsGenie Alert API
    tags:
      - Alerts
      - Incident Management
      - Monitoring
      - Notifications
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/alert-api
    properties:
      - url: https://docs.opsgenie.com/docs/alert-api
        type: Documentation
      - url: openapi/opsgenie-alert-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Alert API allows developers to programmatically create,
      update, close, and manage alerts within the OpsGenie incident management
      platform. Alert creation, deletion, and action requests are processed
      asynchronously to provide higher availability and scalability. The API
      supports setting alert priorities, adding responders such as teams,
      users, escalations, and schedules, attaching tags and custom details,
      and managing alert notes and acknowledgments.
  - aid: opsgenie:incident-api
    name: OpsGenie Incident API
    tags:
      - Incidents
      - Incident Management
      - Operations
      - Response
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/incident-api
    properties:
      - url: https://docs.opsgenie.com/docs/incident-api
        type: Documentation
      - url: openapi/opsgenie-incident-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Incident API enables developers to create and manage
      incidents programmatically. It supports defining responders, tags,
      custom details, priority levels, and impacted services for each
      incident. The Incident API is available to Standard and Enterprise
      plan users and provides endpoints for creating, updating, closing,
      and resolving incidents as part of a structured incident response
      workflow.
  - aid: opsgenie:user-api
    name: OpsGenie User API
    tags:
      - Users
      - Accounts
      - Identity
      - Management
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/user-api
    properties:
      - url: https://docs.opsgenie.com/docs/user-api
        type: Documentation
      - url: openapi/opsgenie-user-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie User API provides endpoints for managing user accounts
      within the OpsGenie platform. Developers can create, retrieve, update,
      and delete users, as well as list users and retrieve escalations
      associated with specific users. The API supports managing user roles,
      contact methods, and notification preferences to ensure the right
      people are reached during incidents.
  - aid: opsgenie:team-api
    name: OpsGenie Team API
    tags:
      - Teams
      - Groups
      - Collaboration
      - Management
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/team-api
    properties:
      - url: https://docs.opsgenie.com/docs/team-api
        type: Documentation
      - url: openapi/opsgenie-team-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Team API allows developers to manage teams within the
      OpsGenie platform programmatically. It provides endpoints for creating,
      updating, retrieving, and deleting teams, as well as managing team
      members and their roles. Teams are a core organizational unit in
      OpsGenie used to route alerts and assign on-call responsibilities
      to groups of users.
  - aid: opsgenie:schedule-api
    name: OpsGenie Schedule API
    tags:
      - Schedules
      - On-Call
      - Rotations
      - Planning
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/schedule-api
    properties:
      - url: https://docs.opsgenie.com/docs/schedule-api
        type: Documentation
      - url: openapi/opsgenie-schedule-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Schedule API enables developers to programmatically manage
      on-call schedules and rotations. It provides endpoints for creating,
      updating, and deleting schedules, as well as managing schedule rotations
      and overrides. Developers can query who is currently on call for a given
      schedule, making it possible to build custom dashboards and integrations
      that reflect real-time on-call status.
  - aid: opsgenie:escalation-api
    name: OpsGenie Escalation API
    tags:
      - Escalations
      - Routing
      - Alerts
      - Workflows
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/escalation-api
    properties:
      - url: https://docs.opsgenie.com/docs/escalation-api
        type: Documentation
      - url: openapi/opsgenie-escalation-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Escalation API allows developers to manage escalation
      policies that define how alerts are routed when initial responders do
      not acknowledge them. It provides endpoints for creating, updating,
      retrieving, and deleting escalation configurations. Escalation rules
      define the sequence of notifications sent to teams, users, and
      schedules with configurable delay intervals to ensure incidents are
      addressed in a timely manner.
  - aid: opsgenie:integration-api
    name: OpsGenie Integration API
    tags:
      - Integrations
      - Connections
      - Third Party
      - Automation
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/integration-api
    properties:
      - url: https://docs.opsgenie.com/docs/integration-api
        type: Documentation
      - url: openapi/opsgenie-integration-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Integration API enables developers to programmatically
      manage integrations that connect OpsGenie with third-party monitoring,
      ticketing, and communication tools. It provides endpoints for creating,
      enabling, disabling, and configuring integrations and their associated
      actions. Note that the Integration API does not support Zendesk, Slack,
      or Incoming Call integrations, which must be configured through the
      OpsGenie web interface.
  - aid: opsgenie:heartbeat-api
    name: OpsGenie Heartbeat API
    tags:
      - Heartbeat
      - Health Checks
      - Monitoring
      - Uptime
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/heartbeat-api
    properties:
      - url: https://docs.opsgenie.com/docs/heartbeat-api
        type: Documentation
      - url: openapi/opsgenie-heartbeat-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Heartbeat API allows developers to set up and manage
      heartbeat monitors that track the health and availability of systems
      and services. Heartbeats work by expecting periodic pings from
      monitored systems, and when a ping is not received within the
      configured interval, OpsGenie generates an alert. The API provides
      endpoints for creating, updating, deleting, and pinging heartbeats,
      enabling automated health monitoring for infrastructure and
      applications.
  - aid: opsgenie:service-api
    name: OpsGenie Service API
    tags:
      - Services
      - Service Catalog
      - Operations
      - Management
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/service-api
    properties:
      - url: https://docs.opsgenie.com/docs/service-api
        type: Documentation
      - url: openapi/opsgenie-service-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Service API enables developers to manage services within
      the OpsGenie platform. Services represent business-critical
      applications and components that can be associated with incidents to
      track their impact. The API provides endpoints for creating, updating,
      retrieving, and deleting services. The Service API is available to
      Standard and Enterprise plan users and is used in conjunction with
      the Incident API to identify which services are affected during an
      outage.
  - aid: opsgenie:notification-rule-api
    name: OpsGenie Notification Rule API
    tags:
      - Notifications
      - Rules
      - Alerts
      - Configuration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/notification-rule-api
    properties:
      - url: https://docs.opsgenie.com/docs/notification-rule-api
        type: Documentation
      - url: openapi/opsgenie-notification-rule-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Notification Rule API allows developers to manage
      notification rules that control how and when users receive alert
      notifications. It provides endpoints for creating, updating, and
      deleting notification rules, including defining conditions, time
      restrictions, and notification channels such as email, SMS, push
      notifications, and voice calls. This API enables fine-grained control
      over notification behavior for individual users.
  - aid: opsgenie:account-api
    name: OpsGenie Account API
    tags:
      - Accounts
      - Administration
      - Settings
      - Configuration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/account-api
    properties:
      - url: https://docs.opsgenie.com/docs/account-api
        type: Documentation
      - url: openapi/opsgenie-account-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Account API provides endpoints for retrieving account-level
      information and configuration settings. Developers can use this API
      to access details about their OpsGenie account, including plan
      information and account metadata. It serves as a foundational API
      for administrative operations and account management within the
      OpsGenie platform.
  - aid: opsgenie:maintenance-api
    name: OpsGenie Maintenance API
    tags:
      - Maintenance
      - Windows
      - Scheduling
      - Operations
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.opsgenie.com
    humanURL: https://docs.opsgenie.com/docs/maintenance-api
    properties:
      - url: https://docs.opsgenie.com/docs/maintenance-api
        type: Documentation
      - url: openapi/opsgenie-maintenance-openapi.yml
        type: OpenAPI
    description: >-
      The OpsGenie Maintenance API allows developers to manage maintenance
      windows that suppress alert notifications during planned maintenance
      periods. It provides endpoints for creating, updating, listing, and
      deleting maintenance windows with configurable time ranges and rules
      for which integrations or policies are affected. This helps operations
      teams avoid unnecessary alerting during scheduled downtime.
