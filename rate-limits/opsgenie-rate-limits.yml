specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Opsgenie
providerId: opsgenie
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Incident Response
description: Opsgenie API rate limits per integration/key.
sources:
  - https://www.atlassian.com/software/opsgenie/pricing
  - https://docs.opsgenie.com/docs/api-rate-limiting
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Alerts API (Standard)
    scope: integration
    metric: requests_per_minute
    limit: 60
    timeFrame: minute
  - name: Alerts API (high-volume integrations)
    scope: integration
    metric: requests_per_minute
    limit: 10000
    timeFrame: minute
  - name: Other endpoints
    scope: key
    metric: requests_per_minute
    limit: 600
    timeFrame: minute
